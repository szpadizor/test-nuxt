services:

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"

  laravel:
    build:
      context: backend
    container_name: laravel
    volumes:
      - ./backend:/var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql
    ports:
      - "8000:8000"

  nuxt:
    build:
      context: frontend
    container_name: nuxt
    command: npm run dev
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    depends_on:
      - laravel
    ports:
      - "3000:3000"
volumes:
  node_modules: